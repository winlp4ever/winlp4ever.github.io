<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Site — Variants</title>

<!-- Fraunces (variable, opsz + ital) + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f0eee9;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
  a { color: inherit; }
  /* Subtle hover treatment for links inside artboards */
  a:hover { opacity: 0.6; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="articles-data.jsx"></script>
<script type="text/babel" src="variant-classic.jsx"></script>
<script type="text/babel" src="variant-ledger.jsx"></script>
<script type="text/babel" src="variant-index.jsx"></script>
<script type="text/babel" src="variant-statement.jsx"></script>

<script type="text/babel" data-presets="react">
  const { VariantClassic, VariantLedger, VariantIndex, VariantStatement } = window;

  // Each variant lives in an artboard sized to a typical desktop viewport.
  // The DCArtboard is a static frame — we set explicit pixel dimensions
  // and let the variant fill it. Internal scrolling is intentional for
  // the longer ones so users can preview the full page.

  const ARTBOARD_W = 1200;
  const ARTBOARD_H = 1500;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="hero"
          title="Personal site — minimalist directions"
          subtitle="Four takes on a writer-first developer page. Fraunces throughout, JetBrains Mono for meta. Black-on-white, no accents."
        >
          <DCArtboard
            id="classic"
            label="A · Classic editorial"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <VariantClassic />
          </DCArtboard>

          <DCArtboard
            id="ledger"
            label="B · Asymmetric ledger"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <VariantLedger />
          </DCArtboard>

          <DCArtboard
            id="index"
            label="C · Index / archive"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <VariantIndex />
          </DCArtboard>

          <DCArtboard
            id="statement"
            label="D · Typographic statement"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <VariantStatement />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
